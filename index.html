<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smurdy - Geography Quiz Game</title>
    <meta name="description" content="Play free geography quiz games on Smurdy. Learn countries, states, and more.">
    <link
        rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@5.20.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="/styles/style.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8056486411795353"
     crossorigin="anonymous"></script>
</head>
<body>
    <div id="quiz-panel">
        <div id="quiz-target">Loading quiz...</div>
        <div id="quiz-timer">00:00</div>
        <div id="quiz-progress"></div>
        <div id="quiz-accuracy"></div>
        <div id="quiz-result"></div>

        <div id="quiz-buttons">
            <button id="quiz-restart">Restart</button>
            <button id="quiz-back">Back</button>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@5.20.1/dist/maplibre-gl.js"></script>
    <script src="/src/js/app.js" defer></script>
    <script src="/src/js/manifest.js" defer></script>
    <script src="/src/js/browse.js" defer></script>
</body>
</html>
